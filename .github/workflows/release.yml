name: Build Release

on:
  push:
    tags:
      - 'v*'
      - 'V*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform_suffix: windows
          - os: macos-15-intel
            platform_suffix: macos-intel
          - os: macos-latest
            platform_suffix: macos-apple-silicon

    runs-on: ${{ matrix.os }}
    env:
      APP_DIRNAME: SiadHeadAnalyzer
      RELEASE_VERSION: ${{ github.ref_name }}
      ARCHIVE_BASENAME: ReportSIAD-${{ github.ref_name }}-${{ matrix.platform_suffix }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Build executable
        run: pyinstaller --noconfirm siad_report_gui.spec

      - name: Archive build (Windows)
        if: runner.os == 'Windows'
        working-directory: dist
        shell: pwsh
        run: Compress-Archive -Path "${env:APP_DIRNAME}" -DestinationPath "${env:ARCHIVE_BASENAME}.zip"

      - name: Archive build (macOS)
        if: runner.os == 'macOS'
        working-directory: dist
        run: zip -r "${ARCHIVE_BASENAME}.zip" "${APP_DIRNAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_BASENAME }}
          path: dist/${{ env.ARCHIVE_BASENAME }}.zip

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ARCHIVE_BASENAME }}.zip
