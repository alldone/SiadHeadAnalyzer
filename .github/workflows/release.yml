name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: ReportSIAD-windows
            archive_cmd: powershell -Command "Compress-Archive -Path dist/ReportSIAD/* -DestinationPath dist/ReportSIAD-windows.zip"
            archive_path: dist/ReportSIAD-windows.zip
          - os: macos-15-intel
            artifact_name: ReportSIAD-macos-intel
            archive_cmd: zip -r dist/ReportSIAD-macos-intel.zip dist/ReportSIAD
            archive_path: dist/ReportSIAD-macos-intel.zip
          - os: macos-latest
            artifact_name: ReportSIAD-macos-apple-silicon
            archive_cmd: zip -r dist/ReportSIAD-macos-apple-silicon.zip dist/ReportSIAD
            archive_path: dist/ReportSIAD-macos-apple-silicon.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Build executable
        run: pyinstaller --noconfirm siad_report_gui.spec

      - name: Archive build
        run: ${{ matrix.archive_cmd }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.archive_path }}

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_path }}
